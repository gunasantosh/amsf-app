{% extends "base.html" %}

{% block title %}Forgot Password - AMSF{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass auth-box">
        <h1>Password Reset</h1>
        <p class="auth-copy">Enter the name tied to your AMSF member record. If an email is on file, a reset link will be sent there.</p>
        <form action="/api/forgot-password" method="POST">
            <div class="form-group">
                <label for="original_name">Full Name</label>
                <input type="text" id="original_name" name="original_name" class="form-control" required placeholder="e.g. B. GUNA">
            </div>
            <button type="submit" class="btn">Send Reset Link</button>
        </form>
        <div class="auth-links">
            <a href="/login">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
