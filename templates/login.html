{% extends "base.html" %}

{% block title %}Login - AMSF{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass auth-box">
        <h1>AMSF Login</h1>
        <p class="auth-copy">Use your Excel name and your current password. First-time members start with the default password.</p>

        <form action="/api/login" method="POST">
            <div class="form-group">
                <label for="original_name">Full Name (from Excel)</label>
                <input type="text" id="original_name" name="original_name" class="form-control" required placeholder="e.g. B. GUNA">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Default password">
            </div>
            
            <button type="submit" class="btn">Access Portal</button>
        </form>
        <div class="auth-links">
            <a href="/forgot-password">Forgot password?</a>
            <span>Default password: <strong>amsf123</strong></span>
        </div>
    </div>
</div>
{% endblock %}
